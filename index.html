<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase Auth</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootswatch/4.5.2/lux/bootstrap.min.css">
</head>

<body>
    <div class="container">
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary border-bottom">
            <a class="navbar-brand" href="#">Navbar</a>
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarColor01"
                aria-controls="navbarColor01" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarColor01">
                <ul class="navbar-nav ml-auto">
                    <li class="nav-item logged-out" style="display: none;">
                        <a class="nav-link" href="#" data-toggle="modal" data-target="#signinModal">Ingresar</a>
                    </li>
                    <li class="nav-item logged-out" style="display: none;">
                        <a class="nav-link" href="#" data-toggle="modal" data-target="#signupModal">Regístrate</a>
                    </li>
                    <li class="nav-item logged-in" style="display: none;">
                        <a class="nav-link" href="#" id="salir">Salir</a>
                    </li>
                </ul>
            </div>
        </nav>

        <div class="container p-4">
            <div class="row">
                <div class="col-md-6 offset-md-3">
                    <ul class="list-group" id="posts">
                       
                    </ul>
                </div>
            </div>
        </div>

        <div class="modal" id="signupModal">
            <div class="modal-dialog" role="document">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Modal title</h5>
                        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                            <span aria-hidden="true">&times;</span>
                        </button>
                    </div>
                    <div class="modal-body">
                        <form id="signup-form">
                            <div class="form-group">
                                <input type="text" id="signup-email" class="form-control" placeholder="Email"
                                    required />
                            </div>
                            <div class="form-group">
                                <input type="password" id="signup-password" class="form-control"
                                    placeholder="Contraseña" required />
                            </div>
                            <button type="submit" class="btn btn-primary">Regístrate</button>
                            <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <div class="modal" id="signinModal">
            <div class="modal-dialog" role="document">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Modal title</h5>
                        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                            <span aria-hidden="true">&times;</span>
                        </button>
                    </div>
                    <div class="modal-body">
                        <form id="signin-form">
                            <div class="form-group">
                                <input type="text" id="signin-email" class="form-control" placeholder="Email"
                                    required />
                            </div>
                            <div class="form-group">
                                <input type="password" id="signin-password" class="form-control"
                                    placeholder="Contraseña" required />
                            </div>
                            <button type="submit" class="btn btn-secondary btn-block">Ingresar</button>
                            <button type="button" class="btn btn-info btn-block" id="google-login">Login con Google</button>
                            <button type="button" class="btn btn-primary btn-block" id="facebook-login">Login con Facebook</button>
                            <button type="button" class="btn btn-secondary btn-block" data-dismiss="modal">Close</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"
        integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js"

        crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

    <!-- The core Firebase JS SDK is always required and must be listed first -->

    <!-- TODO: Add SDKs for Firebase products that you want to use
     https://firebase.google.com/docs/web/setup#available-libraries -->

    <script src="https://www.gstatic.com/firebasejs/8.2.9/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.2.9/firebase-firestore.js"></script>

    <script src="main.js"></script>

</body>
</html>
